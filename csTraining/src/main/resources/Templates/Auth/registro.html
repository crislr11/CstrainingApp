<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-container">
    <h2>Registro de Usuario</h2>
    <form id="registerForm">
        <div class="input-group">
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="input-group">
            <label for="role">Rol:</label>
            <select id="role" name="role" required>
                <option value="PROFESOR">Profesor</option>
                <option value="OPOSITOR">Opositor</option>
            </select>
        </div>
        <div class="input-group">
            <label for="oposicion">Oposición:</label>
            <select id="oposicion" name="oposicion" required>
                <option value="POLICIA_LOCAL">Policía Local</option>
                <option value="GUARDIA_CIVIL">Guardia Civil</option>
                <!-- Añade más opciones según sea necesario -->
            </select>
        </div>
        <button type="submit">Registrar</button>
    </form>

    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
